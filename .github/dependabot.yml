version: 2

updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - rust
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10
